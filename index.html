<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>末日求生 - 打僵尸</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;position:fixed;width:100%;height:100%}
canvas{display:block;position:absolute;top:0;left:0}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize(); window.addEventListener('resize',resize);

// 音效
const AudioCtx=window.AudioContext||window.webkitAudioContext; let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function sfx(f,t,d,v=0.06){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);
}

// 游戏状态
let player, bullets, zombies, particles, score, wave, waveTimer, zombiesToSpawn, zombiesSpawned, zombiesKilled, gameOver, gameStarted, frame=0;

// 触摸/鼠标输入
let touches={}; // id -> {x,y,startX,startY}

function getInputPos(e){
  let x,y;
  if(e.touches){x=e.touches[0].clientX;y=e.touches[0].clientY}
  else{x=e.clientX;y=e.clientY}
  return {x,y};
}

// 双摇杆状态
let moveStick={active:false,id:null,baseX:0,baseY:0,dx:0,dy:0};
let shootStick={active:false,id:null,baseX:0,baseY:0,dx:0,dy:0};
let shootDown=false; // PC鼠标

canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); initAudio();
  if(!gameStarted){startGame();return}
  if(gameOver){restartGame();return}
  for(let t of e.changedTouches){
    let x=t.clientX, y=t.clientY;
    let isLeft=x<canvas.width*0.45;
    let isRight=x>canvas.width*0.55;
    if(isLeft && !moveStick.active){
      moveStick={active:true,id:t.identifier,baseX:x,baseY:y,dx:0,dy:0};
    }else if(isRight && !shootStick.active){
      shootStick={active:true,id:t.identifier,baseX:x,baseY:y,dx:0,dy:0};
    }else if(!moveStick.active){
      moveStick={active:true,id:t.identifier,baseX:x,baseY:y,dx:0,dy:0};
    }
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(let t of e.changedTouches){
    if(moveStick.active && t.identifier===moveStick.id){
      moveStick.dx=t.clientX-moveStick.baseX;
      moveStick.dy=t.clientY-moveStick.baseY;
    }
    if(shootStick.active && t.identifier===shootStick.id){
      shootStick.dx=t.clientX-shootStick.baseX;
      shootStick.dy=t.clientY-shootStick.baseY;
    }
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  for(let t of e.changedTouches){
    if(moveStick.active && t.identifier===moveStick.id) moveStick={active:false,id:null,baseX:0,baseY:0,dx:0,dy:0};
    if(shootStick.active && t.identifier===shootStick.id) shootStick={active:false,id:null,baseX:0,baseY:0,dx:0,dy:0};
  }
});

canvas.addEventListener('mousedown',e=>{
  initAudio();
  if(!gameStarted){startGame();return}
  if(gameOver){restartGame();return}
  shootDown=true;
});

canvas.addEventListener('mousemove',e=>{});
canvas.addEventListener('mouseup',()=>{shootDown=false});

// 键盘
let keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.key]=false});

function getAimAngle(){
  // 触屏: 右摇杆方向, 没操作时朝移动方向
  if(shootStick.active && (Math.abs(shootStick.dx)>8||Math.abs(shootStick.dy)>8)){
    return Math.atan2(shootStick.dy, shootStick.dx);
  }
  // 没有右摇杆时: 朝移动方向射击
  if(moveStick.active && (Math.abs(moveStick.dx)>8||Math.abs(moveStick.dy)>8)){
    return Math.atan2(moveStick.dy, moveStick.dx);
  }
  // PC: 朝鼠标方向
  return Math.atan2(mouse.y-player.y, mouse.x-player.x);
}

let mouse={x:0,y:0};
canvas.addEventListener('mousemove',e=>{mouse.x=e.offsetX;mouse.y=e.offsetY});

function isShooting(){
  if(shootStick.active && (Math.abs(shootStick.dx)>8||Math.abs(shootStick.dy)>8)) return true;
  if(shootDown) return true;
  // 只有左摇杆没有右摇杆时自动射击
  if(moveStick.active && !shootStick.active && (Math.abs(moveStick.dx)>20||Math.abs(moveStick.dy)>20)) return true;
  return false;
}

function startGame(){
  gameStarted=true; waveSound();
}
function restartGame(){
  let W=canvas.width,H=canvas.height;
  player={x:W/2,y:H/2,r:14,hp:100,maxHp:100,speed:3.5,shootCD:0,shootRate:14};
  bullets=[]; zombies=[]; particles=[]; score=0; wave=1; waveTimer=0;
  zombiesToSpawn=5; zombiesSpawned=0; zombiesKilled=0; gameOver=false; gameStarted=true;
  waveSound();
}

// 音效
function shootSfx(){sfx(200,'square',0.08,0.05);sfx(80,'sawtooth',0.05,0.03)}
function zombieDie(){sfx(60,'sawtooth',0.12,0.08)}
function playerHit(){sfx(120,'triangle',0.18,0.06)}
function waveSound(){sfx(400,'square',0.1,0.04);sfx(600,'square',0.08,0.04);sfx(800,'square',0.06,0.04)}

function spawnZombie(){
  let W=canvas.width,H=canvas.height;
  let side=Math.floor(Math.random()*4), m=40;
  let x,y;
  if(side===0){x=Math.random()*W;y=-m}
  else if(side===1){x=W+m;y=Math.random()*H}
  else if(side===2){x=Math.random()*W;y=H+m}
  else{x=-m;y=Math.random()*H}
  let hp=2+Math.floor(wave*0.7);
  let spd=1.0+wave*0.12+(Math.random()-0.5)*0.4;
  let sz=12+Math.floor(Math.random()*7);
  let big=Math.random()<0.12;
  zombies.push({x,y,r:sz,hp:big?hp*3:hp,maxHp:big?hp*3:hp,speed:big?spd*0.65:spd,dmg:8+wave*1.5,big});
  if(big)zombies[zombies.length-1].r+=8;
}

function nextWave(){
  wave++; zombiesToSpawn=5+wave*3; zombiesSpawned=0; zombiesKilled=0; waveTimer=0;
  player.hp=Math.min(player.maxHp,player.hp+20);
  waveSound();
  // 粒子
  for(let i=0;i<30;i++){
    particles.push({x:canvas.width/2,y:canvas.height/2,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12,life:25,color:'#ffaa00',r:2+Math.random()*4});
  }
}

function update(){
  if(!gameStarted||gameOver) return;
  let W=canvas.width,H=canvas.height;

  // 移动
  let dx=0,dy=0;
  if(moveStick.active){
    let d=Math.hypot(moveStick.dx,moveStick.dy);
    if(d>10){dx=moveStick.dx/d;dy=moveStick.dy/d}
  }
  if(keys['w']||keys['ArrowUp']){dy=-1;if(dx===0)dx=0}
  if(keys['s']||keys['ArrowDown']){dy=1;if(dx===0)dx=0}
  if(keys['a']||keys['ArrowLeft']){dx=-1;if(dy===0)dy=0}
  if(keys['d']||keys['ArrowRight']){dx=1;if(dy===0)dy=0}
  if(dx&&dy){dx*=0.707;dy*=0.707}
  player.x=Math.max(player.r,Math.min(W-player.r,player.x+dx*player.speed));
  player.y=Math.max(player.r,Math.min(H-player.r,player.y+dy*player.speed));

  // 射击
  if(player.shootCD>0)player.shootCD--;
  if(isShooting()&&player.shootCD<=0){
    let angle=getAimAngle();
    bullets.push({x:player.x+Math.cos(angle)*18,y:player.y+Math.sin(angle)*18,vx:Math.cos(angle)*8,vy:Math.sin(angle)*8,r:3,life:50});
    player.shootCD=player.shootRate;
    shootSfx();
  }

  // 僵尸生成
  if(zombiesSpawned<zombiesToSpawn){
    waveTimer++;
    if(waveTimer>=Math.max(15,45-wave*2)){spawnZombie();zombiesSpawned++;waveTimer=0}
  }

  // 僵尸移动
  for(let z of zombies){
    let a=Math.atan2(player.y-z.y,player.x-z.x);
    z.x+=Math.cos(a)*z.speed; z.y+=Math.sin(a)*z.speed;
    let dist=Math.hypot(z.x-player.x,z.y-player.y);
    if(dist<z.r+player.r){
      player.hp-=z.dmg*0.25; playerHit();
      particles.push({x:player.x,y:player.y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:12,color:'#f00',r:3});
      let px=z.x-player.x,py=z.y-player.y,d=Math.hypot(px,py)||1;
      z.x+=px/d*16; z.y+=py/d*16;
      if(player.hp<=0){player.hp=0;gameOver=true}
    }
    // 子弹碰撞
    for(let i=bullets.length-1;i>=0;i--){
      let b=bullets[i];
      if(Math.hypot(b.x-z.x,b.y-z.y)<z.r+b.r){
        z.hp--; bullets.splice(i,1);
        particles.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:6,color:'#8f8',r:2});
        if(z.hp<=0){
          zombieDie();
          for(let j=0;j<10;j++)particles.push({x:z.x,y:z.y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:16,color:'#f44',r:2+Math.random()*3});
          score+=z.big?5:1; zombiesKilled++;
        }
      }
    }
  }
  zombies=zombies.filter(z=>z.hp>0);
  bullets=bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;return b.x>0&&b.x<W&&b.y>0&&b.y<H&&b.life>0});
  // 粒子
  for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.life--}
  particles=particles.filter(p=>p.life>0);
  // 波次完成
  if(zombiesSpawned>=zombiesToSpawn&&zombies.length===0) nextWave();
}

// 渲染
function draw(){
  let W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // 地面
  let gs=Math.floor(Math.min(W,H)/18);
  for(let i=0;i<20;i++) for(let j=0;j<20;j++){
    ctx.fillStyle=(i+j)%2===0?'#1a1a1a':'#111';
    ctx.fillRect(i*gs,j*gs,gs+1,gs+1);
  }

  // 血迹装饰
  let stains=[[0.15,0.3,30],[0.7,0.25,22],[0.8,0.7,18],[0.3,0.6,25],[0.5,0.15,20]];
  for(let [rx,ry,r] of stains){
    ctx.fillStyle='rgba(50,0,0,0.25)';
    ctx.beginPath();ctx.arc(rx*W,ry*H,r+Math.sin(frame*0.02+rx*10)*8,0,Math.PI*2);ctx.fill();
  }

  // 粒子
  for(let p of particles){
    ctx.globalAlpha=p.life/(p.life+5);
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // 子弹
  for(let b of bullets){
    ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.4,0,Math.PI*2);ctx.fill();
  }

  // 僵尸
  for(let z of zombies){
    ctx.save();ctx.translate(z.x,z.y);
    ctx.fillStyle=z.big?'#3a5a3a':'#2d4a2d';ctx.fillRect(-z.r,-z.r*0.7,z.r*2,z.r*1.6);
    ctx.fillStyle='#4a6a4a';ctx.beginPath();ctx.arc(0,-z.r*0.5,z.r*0.7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(-z.r*0.25,-z.r*0.55,z.r*0.18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(z.r*0.25,-z.r*0.55,z.r*0.18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.fillRect(-z.r*0.25,-z.r*0.22,z.r*0.5,z.r*0.18);
    let t=frame*0.12;
    ctx.strokeStyle=z.big?'#3a5a3a':'#2d4a2d';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-z.r*0.8,0);ctx.lineTo(-z.r*1.3,Math.sin(t)*z.r*0.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(z.r*0.8,0);ctx.lineTo(z.r*1.3,Math.sin(t+1)*z.r*0.5);ctx.stroke();
    if(z.big){ctx.fillStyle='#ff0';ctx.font=`${Math.max(9,z.r*0.7)}px monospace`;ctx.textAlign='center';ctx.fillText('BOSS',0,-z.r-10)}
    if(z.hp<z.maxHp){
      ctx.fillStyle='#300';ctx.fillRect(-z.r,z.r+3,z.r*2,3);
      ctx.fillStyle='#f00';ctx.fillRect(-z.r,z.r+3,z.r*2*(z.hp/z.maxHp),3);
    }
    ctx.restore();
  }

  // 玩家
  if(!gameOver){
    ctx.save();ctx.translate(player.x,player.y);
    let aimAngle=getAimAngle();ctx.rotate(aimAngle);
    ctx.fillStyle='#48c';ctx.fillRect(-10,-7,20,14);
    ctx.fillStyle='#fc8';ctx.beginPath();ctx.arc(7,0,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';ctx.fillRect(9,-3,6,2);ctx.fillStyle='#8cf';ctx.fillRect(10,-2,4,1);
    ctx.fillStyle='#555';ctx.fillRect(12,-2,16,4);ctx.fillStyle='#333';ctx.fillRect(26,-3,4,6);
    if(isShooting()&&player.shootCD>player.shootRate-3){
      ctx.fillStyle='#fa0';ctx.beginPath();ctx.arc(30,0,4.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(30,0,2,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
    // 血条
    ctx.fillStyle='#300';ctx.fillRect(player.x-18,player.y-24,36,5);
    ctx.fillStyle=player.hp>50?'#0f0':(player.hp>25?'#ff0':'#f00');
    ctx.fillRect(player.x-18,player.y-24,36*(player.hp/player.maxHp),5);
  }

  // UI
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(16,W*0.04)}px monospace`;ctx.textAlign='left';
  ctx.fillText(`击杀:${score}`,10,30);
  ctx.fillStyle='#fa0';ctx.fillText(`第${wave}波`,10,55);
  ctx.fillStyle='#0f0';ctx.font=`${Math.max(11,W*0.03)}px monospace`;
  ctx.fillText(`🧟${zombies.length}`,10,78);

  // 虚拟摇杆
  if(moveStick.active){
    ctx.globalAlpha=0.3;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(moveStick.baseX,moveStick.baseY,40,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(moveStick.baseX+moveStick.dx,moveStick.baseY+moveStick.dy,20,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  if(shootStick.active){
    ctx.globalAlpha=0.3;
    ctx.fillStyle='#f44';ctx.beginPath();ctx.arc(shootStick.baseX,shootStick.baseY,35,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#f66';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#faa';ctx.beginPath();ctx.arc(shootStick.baseX+shootStick.dx,shootStick.baseY+shootStick.dy,18,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // 摇杆提示
  if(!gameStarted){
    ctx.globalAlpha=0.15;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(W*0.2,H*0.5,35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f44';ctx.beginPath();ctx.arc(W*0.75,H*0.5,35,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // 开始/结束界面
  if(!gameStarted){
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#f44';ctx.font=`bold ${Math.max(32,W*0.07)}px monospace`;ctx.textAlign='center';
    ctx.fillText('☠ 末日求生 ☠',W/2,H*0.35);
    ctx.fillStyle='#0f0';ctx.font=`${Math.max(13,W*0.035)}px monospace`;
    ctx.fillText('左手控制移动',W*0.2,H*0.55);
    ctx.fillText('右手控制射击',W*0.75,H*0.55);
    ctx.fillStyle='#fa0';ctx.font=`${Math.max(12,W*0.03)}px monospace`;
    ctx.fillText('双摇杆操作 僵尸波次闯关',W/2,H*0.7);
    let a=0.5+Math.sin(frame*0.04)*0.5;
    ctx.globalAlpha=a;ctx.fillText('点击屏幕开始',W/2,H*0.82);ctx.globalAlpha=1;
  }
  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#f00';ctx.font=`bold ${Math.max(36,W*0.08)}px monospace`;ctx.textAlign='center';
    ctx.fillText('☠ 你死了 ☠',W/2,H*0.38);
    ctx.fillStyle='#fff';ctx.font=`${Math.max(16,W*0.04)}px monospace`;
    ctx.fillText(`击杀 ${score} 只  |  第 ${wave} 波`,W/2,H*0.52);
    let a=0.5+Math.sin(frame*0.04)*0.5;
    ctx.globalAlpha=a;ctx.fillStyle='#fa0';ctx.fillText('点击屏幕重新开始',W/2,H*0.65);ctx.globalAlpha=1;
  }

  // PC按键提示
  if(!gameStarted){
    ctx.fillStyle='#888';ctx.font=`${Math.max(10,W*0.025)}px monospace`;ctx.textAlign='center';
    ctx.fillText('电脑端: WASD移动 鼠标瞄准+射击',W/2,H*0.9);
  }
}

function loop(){
  frame++; update(); draw(); requestAnimationFrame(loop);
}

// 初始化
let W=canvas.width,H=canvas.height;
player={x:W/2,y:H/2,r:14,hp:100,maxHp:100,speed:3.5,shootCD:0,shootRate:14};
bullets=[];zombies=[];particles=[];score=0;wave=1;waveTimer=0;
zombiesToSpawn=5;zombiesSpawned=0;zombiesKilled=0;gameOver=false;gameStarted=false;

loop();
</script>
</body>
</html>
