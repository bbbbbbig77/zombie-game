<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>肌肉英雄 - 撸树赚钱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;position:fixed;width:100%;height:100%;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
canvas{display:block}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;W=canvas.width;H=canvas.height}
resize();window.addEventListener('resize',resize);

// ========== 音效系统 ==========
let sfxOn=true;
function ensureAudio(){
  if(!bgmCtx)try{bgmCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){return false}
  if(bgmCtx.state==='suspended')bgmCtx.resume();
  return bgmCtx.state==='running';
}
function sfx(freq,type,dur,vol=0.08,detune=0){
  if(!sfxOn)return;
  try{
    if(!ensureAudio())return;
    let o=bgmCtx.createOscillator(),g=bgmCtx.createGain();
    o.type=type;o.frequency.value=freq;if(detune)o.detune.value=detune;
    g.gain.setValueAtTime(vol,bgmCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,bgmCtx.currentTime+dur);
    o.connect(g);g.connect(bgmCtx.destination);o.start(bgmCtx.currentTime);o.stop(bgmCtx.currentTime+dur);
  }catch(e){}
}
function sfxChop(){ // 斧头砍树
  sfx(150,'sawtooth',0.12,0.07);sfx(60,'triangle',0.08,0.05);
  setTimeout(()=>{sfx(200,'square',0.06,0.03)},50);
}
function sfxClick(){ // 按钮点击
  sfx(800,'square',0.05,0.03,200);sfx(600,'square',0.04,0.02);
}
function sfxGold(){ // 获得金币
  sfx(1200,'square',0.08,0.05);setTimeout(()=>sfx(1600,'square',0.06,0.04),60);
}
function sfxTreeFall(){ // 树倒下
  sfx(40,'sawtooth',0.3,0.1);sfx(30,'triangle',0.25,0.08);
  for(let i=0;i<5;i++)setTimeout(()=>sfx(80+i*30,'square',0.06,0.03),i*40);
}
function sfxLevelUp(){ // 肌肉升级
  for(let i=0;i<4;i++)setTimeout(()=>sfx(400+i*200,'square',0.08,0.06),i*80);
}

// ========== BGM 放松音乐 ==========
let bgmOn=false, bgmCtx=null, bgmGain=null;
function toggleBGM(){
  if(!bgmCtx){initBGM()}
  bgmOn=!bgmOn;
  if(bgmGain)bgmGain.gain.value=bgmOn?0.12:0;
}
function initBGM(){
  try{
    bgmCtx=new(window.AudioContext||window.webkitAudioContext)();
    bgmGain=bgmCtx.createGain();bgmGain.gain.value=0.12;bgmGain.connect(bgmCtx.destination);
    // 主旋律: 放松的钢鼓感觉
    playBassLoop();playChordLoop();playMelodyLoop();
  }catch(e){}
}
function playNote(freq,start,dura,vol,type='triangle'){
  if(!bgmCtx)return;
  let o=bgmCtx.createOscillator(),g=bgmCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,bgmCtx.currentTime+start);
  g.gain.exponentialRampToValueAtTime(0.001,bgmCtx.currentTime+start+dura);
  o.connect(g);g.connect(bgmGain);o.start(bgmCtx.currentTime+start);o.stop(bgmCtx.currentTime+start+dura);
}
function playBassLoop(){ // 活泼贝斯
  let n=[65.4,82.4,98.0,82.4,73.4,98.0,65.4,82.4,110.0,98.0,82.4,73.4];
  function loop(){for(let i=0;i<n.length;i++){let t=i*0.5;playNote(n[i],t,0.4,0.3,'sine')}setTimeout(()=>{if(bgmOn)loop()},n.length*500);}loop();
}
function playChordLoop(){ // 快乐和弦
  let c=[[261.6,329.6,392.0],[293.7,349.2,440.0],[329.6,392.0,493.9],[261.6,329.6,392.0],[220.0,293.7,349.2],[196.0,261.6,329.6],[220.0,293.7,349.2],[261.6,329.6,392.0]];
  function loop(){for(let i=0;i<c.length;i++){for(let n of c[i])playNote(n,i*1.0,0.9,0.07,'triangle')}setTimeout(()=>{if(bgmOn)loop()},c.length*1000);}loop();
}
function playMelodyLoop(){ // 欢快主旋律
  let m=[523,587,659,523,659,784,880,784,659,587,523,440,494,523,587,523,440,392,349,330,392,440,494,523];
  function loop(){for(let i=0;i<m.length;i++){let t=i*0.35+Math.random()*0.05;playNote(m[i],t,0.18,0.06,'square');playNote(m[i]/2,t,0.15,0.03,'triangle')}setTimeout(()=>{if(bgmOn)loop()},m.length*350+3000);}loop();
}

// ========== 游戏数据 ==========
let gold=0, screen='home', characterIndex=0, particles=[], buttons=[];
let muscles={upper:0,chest:0,abs:0,legs:0};
let xpData={upper:0,chest:0,abs:0,legs:0};
function xpNeeded(m){return 30+Math.floor(m*m*0.5);} // 等级平方增长

// 角色位置 & 移动
let player={x:0,y:0,tx:0,ty:0,moving:false,speed:2.5};
let joystickActive=false, joystickId=null, joystickBaseX=0,joystickBaseY=0,joystickDx=0,joystickDy=0;

// 树
const TREE_TYPES=[
  {name:'🌱小树苗',hp:25,gold:12,color:'#6b8a3a',r:22,xp:0.3},
  {name:'🌲松树',hp:70,gold:35,color:'#4a7a2a',r:30,xp:0.8},
  {name:'🌳橡树',hp:180,gold:90,color:'#6a5a2a',r:38,xp:1.5},
  {name:'🪵铁木',hp:450,gold:220,color:'#7a5a2a',r:46,xp:3},
  {name:'🔥神木',hp:1200,gold:600,color:'#ee6644',r:55,xp:8},
];
let forestTrees=[], chopping=null, chopCD=0, chopGain=0;
const CHOP_INT=45;

const chars=[
  {name:'呆萌小明',gender:'male',skin:'#ffcc88',hair:'#2a2a2a',eyes:'😶',top:'#4488cc',bot:'#334'},
  {name:'丑萌老王',gender:'male',skin:'#ccaa77',hair:'#1a1a1a',eyes:'😜',top:'#cc7744',bot:'#224'},
  {name:'帅气阿强',gender:'male',skin:'#eebb99',hair:'#3a3a3a',eyes:'😎',top:'#44aa44',bot:'#223'},
  {name:'大力小美',gender:'female',skin:'#ffe0cc',hair:'#8b4513',eyes:'😊',top:'#ee6699',bot:'#424'},
  {name:'飒爽阿珍',gender:'female',skin:'#d4a574',hair:'#1a1a1a',eyes:'😏',top:'#66aadd',bot:'#335'},
  {name:'酷酷小黑',gender:'male',skin:'#8d6e63',hair:'#111',eyes:'🫤',top:'#eeaa44',bot:'#332'},
];

// ========== 森林生成 ==========
function spawnForest(){
  forestTrees=[]; chopping=null; chopCD=0;
  let count=25+Math.floor(gold/40); count=Math.min(count,55);
  for(let i=0;i<count;i++){
    for(let tries=0;tries<15;tries++){
      let ti; let rnd=Math.random();
      if(rnd<0.4)ti=0; else if(rnd<0.7)ti=1; else if(rnd<0.87)ti=2; else if(rnd<0.96)ti=3; else ti=4;
      let tp=TREE_TYPES[ti];
      let rx=30+Math.random()*(W-60), ry=40+Math.random()*(H*0.7-20);
      if(Math.hypot(rx-player.x,ry-player.y)<80)continue; // 不挡住出生点
      let overlap=forestTrees.some(t=>Math.hypot(rx-t.x,ry-t.y)<tp.r+t.r+5);
      if(!overlap){forestTrees.push({x:rx,y:ry,hp:tp.hp,maxHP:tp.hp,ti,r:tp.r});break}
    }
  }
}

// ========== 砍树 ==========
function chop(t){
  if(chopCD>0)return;
  chopCD=CHOP_INT;
  sfxChop(); // 🔈砍树音效
  let tp=TREE_TYPES[t.ti];
  let dmg=3+Math.floor(muscles.upper*0.3)+Math.floor(muscles.chest*0.15);
  t.hp-=dmg;
  let hitGold=Math.max(1,Math.floor(tp.gold*(dmg/tp.hp)));
  chopGain=hitGold; gold+=hitGold;if(hitGold>3)sfxGold();
  xpData.upper+=tp.xp*0.15;
  for(let i=0;i<3;i++)particles.push({x:t.x+Math.random()*8,y:t.y,vx:(Math.random()-0.5)*4,vy:-1-Math.random()*4,life:14,color:'#8b5a2b',r:2+Math.random()*2});
  if(hitGold>5)particles.push({x:player.x,y:player.y-20,vx:0,vy:-2,life:18,color:'#ffd700',r:0,text:'💰+'+hitGold});
  if(t.hp<=0){t.hp=0;chopping=null;sfxTreeFall();xpData.upper+=tp.xp*0.7; // 🔈树倒音效
    for(let i=0;i<14;i++)particles.push({x:t.x,y:t.y,vx:(Math.random()-0.5)*12,vy:-3-Math.random()*10,life:22,color:'#ffd700',r:3+Math.random()*4});}
}
function checkExp(){
  for(let k of Object.keys(xpData)){
    let need=xpNeeded(muscles[k]);
    if(xpData[k]>=need&&muscles[k]<100){xpData[k]-=need;muscles[k]=Math.min(100,muscles[k]+1);sfxLevelUp()}
  }
}

// ========== 屏幕 ==========
function goTo(s){
  screen=s;buttons=[];
  if(s==='home'){if(!bgmCtx)initBGM();if(!bgmOn)toggleBGM(); // 自动开BGM
    btn(W*.25,H*.66,Math.min(180,W*.5),60,'🪓 撸树赚钱','#4a8',()=>goTo('forest'));btn(W*.25,H*.66+68,Math.min(180,W*.5),60,'🏋️ 撸铁猛干','#48a',()=>goTo('iron'));btn(W*.25,H*.66+136,Math.min(180,W*.5),44,'👤 换人','#888',()=>goTo('select'));
    // BGM按钮
    btn(W-50,8,42,26,'🎵','rgba(255,255,255,.15)',()=>toggleBGM());}
  if(s==='select'){let n=chars.length;let cols=3;let bw=Math.min(80,W*.22),gap=8;let rows=Math.ceil(n/cols);for(let i=0;i<n;i++){let r=Math.floor(i/cols),c=i%cols;let totalW=cols*bw+(cols-1)*gap;let sx=W/2-totalW/2;let idx=i;btn(sx+c*(bw+gap),H*.55+r*(bw+10),bw,80,chars[i].name,'#555',()=>{characterIndex=idx;goTo('home')})}btn(W/2-50,H*.85,100,36,'← 返回','#555',()=>goTo('home'))}
  if(s==='forest'){player.x=W/2;player.y=H*.65;spawnForest();btn(W/2-50,H*.94,100,36,'← 回主页','#555',()=>goTo('home'));}
  if(s==='iron'){btn(W/2-70,H*.65,140,46,'🏗️ 即将开放','#555',null);btn(W/2-50,H*.76,100,36,'← 返回','#555',()=>goTo('home'))}
  chopCD=0;chopping=null;joystickActive=false;
}

function btn(x,y,w,h,text,color,cb){buttons.push({x,y,w,h,text,color,cb})}

// ========== 画人（占屏幕3/4） ==========
function drawDude(cx,cy,scale){
  let m=muscles;let ch=chars[characterIndex];let isF=ch.gender=='female';
  let WID=96,HGT=128; // 96x128 = max detail
  let g=[];for(let r=0;r<HGT;r++){g[r]=[];for(let c=0;c<WID;c++)g[r][c]=0}
  function B(x,y,w,h,v){for(let r=y;r<y+h;r++)for(let c=x;c<x+w;c++)if(r>=0&&r<HGT&&c>=0&&c<WID)g[r][c]=v}
  let Sk=(x,y,w,h)=>B(x,y,w,h,1),Ha=(x,y,w,h)=>B(x,y,w,h,2),Cl=(x,y,w,h)=>B(x,y,w,h,3);
  let Ey=(x,y,w,h)=>B(x,y,w,h,4),Mu=(x,y,w,h)=>B(x,y,w,h,5),Sh=(x,y,w,h)=>B(x,y,w,h,6);
  let Pa=(x,y,w,h)=>B(x,y,w,h,7),Sd=(x,y,w,h)=>B(x,y,w,h,8),Gl=(x,y,w,h)=>B(x,y,w,h,12);

  let mx=48; // center of 96
  let ps=(screen==='select')?Math.min(H*0.16/HGT,W*0.1/WID):Math.min(H*0.54/HGT,W*0.62/WID);

  // Muscle growth factors
  let ag=m.upper*0.4,cg=m.chest*0.3,lg=m.legs*0.25,abg=m.abs*0.2;
  let gg=m.legs*0.15; // glutes

  // ============= FEET =============
  Sh(mx-16,HGT-8,15,6);Sh(mx+1,HGT-8,15,6);

  // ============= CALVES =============
  let cw=4+Math.floor(lg*0.7);
  Sk(mx-13,96,cw,20);Sk(mx+13-cw,96,cw,20);
  if(m.legs>10){Mu(mx-13,99,cw,2);Mu(mx+13-cw,99,cw,2)}

  // ============= THIGHS =============
  let tw=7+Math.floor(lg);
  Sk(mx-12,72,tw,25);Sk(mx+12-tw,72,tw,25);
  if(m.legs>10){Mu(mx-12,76,tw,3);Mu(mx+12-tw,76,tw,3)}
  if(m.legs>30){Sd(mx-12,72,tw,4);Sd(mx+12-tw,72,tw,4)}

  // ============= GLUTES (butt) =============
  Gl(mx-14,64,12+Math.floor(lg*0.5),8+Math.floor(gg*0.8));
  Gl(mx+2,64,12+Math.floor(lg*0.5),8+Math.floor(gg*0.8));

  // ============= SHORTS/PANTS =============
  Pa(mx-18,60,36,14);

  // ============= BODY =============
  let bw=5+Math.floor(cg);
  Sk(mx-bw,34,bw*2,28);
  // Shirt
  Cl(mx-bw,34,bw*2,18);

  // ---- PECS ----
  if(m.chest>3){Mu(mx,38,1,10)}
  if(m.chest>8){Mu(mx-5,37,1,1);Mu(mx+4,37,1,1)}
  if(m.chest>15){Mu(mx-8,37,3,4);Mu(mx+5,37,3,4)}
  if(m.chest>30){Sd(mx-bw,37,4,8);Sd(mx+bw-4,37,4,8)}
  if(m.chest>50){Mu(mx-10,39,3,5);Mu(mx+7,39,3,5)}

  // ---- ABS ----
  if(m.abs>3){Mu(mx-4,48,8,2)}
  if(m.abs>8){Mu(mx-5,51,10,2)}
  if(m.abs>15){Mu(mx-5,54,10,2);Mu(mx-5,57,10,2)}
  if(m.abs>30){Mu(mx-6,60,12,2);Mu(mx-5,63,10,2)}
  if(m.abs>50){Sd(mx-bw,60,bw*2,4)}

  // ============= ARMS =============
  let aw=4+Math.floor(ag*0.7),at=37;
  Sk(mx-bw-aw-3,at,aw,26);
  let up=(screen=='forest'&&chopping&&chopCD>CHOP_INT*0.6)?-10:0;
  Sk(mx+bw+3,at+up,aw,26);
  if(m.upper>8){Mu(mx-bw-aw-3,at+5,aw,5);Mu(mx+bw+3,at+5+up,aw,5)}
  if(m.upper>25){Sd(mx-bw-aw-3,at+4,aw,8);Sd(mx+bw+3,at+4+up,aw,8)}
  if(m.upper>45){Mu(mx-bw-aw-2,at+4,2,12);Mu(mx+bw+aw,at+4+up,2,12)}
  // forearms
  Sk(mx-bw-aw-4,60,aw+2,8);Sk(mx+bw+3,60+up,aw+2,8);
  // fists
  Sk(mx-bw-aw-5,67,aw+3,6);Sk(mx+bw+4,67+up,aw+3,6);

  // ============= AXE =============
  if(screen=='forest'&&chopping){
    B(mx+bw+aw+5,at-4+up,6,24,9);
    B(mx+bw+aw-4,at-12+up,16,9,10);
  }

  // ============= NECK =============
  Sk(mx-6,28,12,8);

  // ============= HEAD =============
  let hy=1;
  // face shape (big cartoon head)
  Sk(mx-16,hy+4,6,4);Sk(mx+10,hy+4,6,4);
  Sk(mx-18,hy+8,4,8);Sk(mx+14,hy+8,4,8);
  Sk(mx-19,hy+16,3,8);Sk(mx+16,hy+16,3,8);
  Sk(mx-18,hy+24,4,3);Sk(mx+14,hy+24,4,3);
  Sk(mx-15,hy+27,3,3);Sk(mx+12,hy+27,3,3);
  // main face block
  Sk(mx-15,hy+8,30,20);

  // ears
  Sk(mx-21,hy+14,5,10);Sk(mx+16,hy+14,5,10);

  // ---- HAIR ----
  if(isF){
    Ha(mx-18,hy,36,6);
    Ha(mx-19,hy+6,5,16);Ha(mx+14,hy+6,5,16);
    Ha(mx-16,hy+26,4,5);Ha(mx+12,hy+26,4,5);
    Ha(mx-14,hy+30,3,3);Ha(mx+11,hy+30,3,3);
  }else{
    Ha(mx-16,hy,32,5);
    Ha(mx-16,hy+5,3,3);Ha(mx+13,hy+5,3,3);
    Ha(mx-14,hy+6,2,2);Ha(mx+12,hy+6,2,2);
  }

  // ---- FACIAL FEATURES ----
  // eyebrows
  Ey(mx-10,hy+10,6,3);Ey(mx+4,hy+10,6,3);
  // eyes (big anime style)
  Ey(mx-13,hy+15,7,7);Ey(mx+6,hy+15,7,7);
  // pupil highlights
  B(mx-13,hy+15,3,3,0);B(mx+6,hy+15,3,3,0);
  B(mx-8,hy+18,2,2,0);B(mx+9,hy+18,2,2,0);
  // eye whites
  B(mx-14,hy+19,2,1,0);B(mx+5,hy+19,2,1,0);

  // nose
  Sk(mx-3,hy+20,4,5);
  B(mx-2,hy+21,2,1,0); // bridge

  // mouth
  let mw=3+Math.floor(m.chest*0.08);
  Sk(mx-mw,hy+27,mw*2,3);

  // cheek blush
  if(isF){B(mx-16,hy+20,5,5,11);B(mx+11,hy+20,5,5,11)}

  // ============= RENDER =============
  let colors=[
    null,ch.skin,ch.hair,ch.top,'#1a1a1a','rgba(0,0,0,0.3)','#444',ch.bot, // 0-7
    'rgba(0,0,0,0.1)','#6B3A1F','#B0B0B0',                                 // 8-10
    'rgba(255,160,160,0.5)',                                                // 11=blush
    'rgba(200,180,160,0.4)',                                                // 12=glutes
  ];
  let dw=WID*ps,dh=HGT*ps;
  let ox=cx-dw/2,oy=cy-dh*0.48;
  for(let r=0;r<HGT;r++){for(let c=0;c<WID;c++){let v=g[r][c];if(!v||!colors[v])continue;ctx.fillStyle=colors[v];ctx.fillRect(ox+c*ps,oy+r*ps,ps,ps)}}
  if(ps>=2.5){ctx.fillStyle='rgba(0,0,0,0.04)';for(let r=0;r<=HGT;r++)ctx.fillRect(ox,oy+r*ps-0.2,dw,0.2);for(let c=0;c<=WID;c++)ctx.fillRect(ox+c*ps-0.2,oy,0.2,dh)}
}

function drawTree(t){
  let tp=TREE_TYPES[t.ti];
  ctx.save();ctx.translate(t.x,t.y);
  // 树冠阴影
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.arc(2,2,tp.r,0,Math.PI*2);ctx.fill();
  // 树干
  ctx.fillStyle='#7a5a2b';ctx.fillRect(-tp.r*0.22,0,tp.r*0.44,tp.r*1.1);
  // 树冠
  ctx.fillStyle=tp.color;ctx.beginPath();ctx.arc(0,-tp.r*0.25,tp.r,0,Math.PI*2);ctx.fill();
  if(t.ti>=2){ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.arc(tp.r*0.25,-tp.r*0.5,tp.r*0.55,0,Math.PI*2);ctx.fill()}
  if(t.ti>=4){ctx.fillStyle='rgba(255,100,40,0.2)';ctx.beginPath();ctx.arc(0,-tp.r*0.4,tp.r*1.05,0,Math.PI*2);ctx.fill()}
  // 选中/砍中动画
  if(t===chopping&&chopCD>CHOP_INT*0.5){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(0,-tp.r*0.25,tp.r+5,0,Math.PI*2);ctx.fill()}
  // 血条
  if(t.hp>0&&t.hp<t.maxHP){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(-tp.r,tp.r*1.2,tp.r*2,4);
    ctx.fillStyle=t.hp/t.maxHP>0.5?'#0f0':'#ff0';ctx.fillRect(-tp.r,tp.r*1.2,tp.r*2*(t.hp/t.maxHP),4);
  }
  // 名字
  if(t.hp>0&&t.hp<t.maxHP){ctx.fillStyle='#fff';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(tp.name,tp.r*0.7,-tp.r*0.6)}
  ctx.restore();
}

// ========== 更新 ==========
function update(){
  if(chopCD>0)chopCD--;
  checkExp();
  // 角色移动
  if(joystickActive){
    let d=Math.hypot(joystickDx,joystickDy);
    if(d>8){let dx=joystickDx/d,dy=joystickDy/d;player.x+=dx*player.speed;player.y+=dy*player.speed}
  }
  player.x=Math.max(40,Math.min(W-40,player.x));
  player.y=Math.max(50,Math.min(H*0.82,player.y));

  if(screen==='forest'){
    // 树再生
    if(forestTrees.filter(t=>t.hp>0).length<15&&Math.random()<0.02){
      let ti=Math.random()<0.5?0:(Math.random()<0.75?1:2);
      let tp=TREE_TYPES[ti];
      let rx=30+Math.random()*(W-60),ry=40+Math.random()*(H*0.6);
      if(!forestTrees.filter(t=>t.hp>0).some(t=>Math.hypot(rx-t.x,ry-t.y)<tp.r+10))forestTrees.push({x:rx,y:ry,hp:tp.hp,maxHP:tp.hp,ti,r:tp.r});
    }

    // 简单：如果有选中的树就砍
    if(chopping&&chopping.hp>0){if(chopCD<=0)chop(chopping)}
    else chopping=null;
  }

  // 粒子
  for(let p of particles){if(p.vx!==undefined){p.x+=p.vx;p.y+=p.vy}p.life--}
  particles=particles.filter(p=>p.life>0);
}

// ========== 渲染 ==========
function draw(){
  ctx.clearRect(0,0,W,H);

  if(screen==='home'){
    // 动漫唯美天空背景
    let sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#87CEEB');sky.addColorStop(0.4,'#FFB6C1');sky.addColorStop(0.7,'#98FB98');sky.addColorStop(1,'#228B22');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
    // 太阳
    ctx.fillStyle='rgba(255,255,200,0.8)';ctx.beginPath();ctx.arc(W*0.8,H*0.12,W*0.12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,220,0.3)';ctx.beginPath();ctx.arc(W*0.8,H*0.12,W*0.18,0,Math.PI*2);ctx.fill();
    // 白云
    let t=Date.now()*0.0001;
    for(let i=0;i<5;i++){let bx=((W*(0.1+i*0.25)+t*20)%(W+100))-50;let by=H*(0.08+Math.sin(i)*0.06);ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.arc(bx,by,W*0.07,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(bx+W*0.05,by-W*0.02,W*0.05,0,Math.PI*2);ctx.fill();}
    // 远山
    ctx.fillStyle='rgba(100,180,100,0.4)';ctx.beginPath();ctx.moveTo(0,H*0.7);ctx.quadraticCurveTo(W*0.3,H*0.5,W*0.5,H*0.65);ctx.quadraticCurveTo(W*0.7,H*0.55,W,H*0.6);ctx.lineTo(W,H*0.75);ctx.lineTo(0,H*0.75);ctx.fill();
    // 花丛
    for(let i=0;i<10;i++){let fx=W*(0.05+i*0.1),fy=H*(0.72+Math.sin(i)*0.03);ctx.fillStyle=['#ff8888','#ffaa66','#ffdd44','#ff6699','#ffaaaa'][i%5];ctx.beginPath();ctx.arc(fx,fy,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(fx,fy,1.5,0,Math.PI*2);ctx.fill();}
    // 草地
    ctx.fillStyle='#7ec850';ctx.fillRect(0,H*0.74,W,H*0.26);
    ctx.fillStyle='#6ab840';for(let i=0;i<20;i++){ctx.beginPath();ctx.moveTo(W*(i*0.05),H*0.74);ctx.lineTo(W*(i*0.05+0.02),H*0.68-Math.sin(i)*5);ctx.lineTo(W*(i*0.05+0.04),H*0.74);ctx.fill()}
    // 闪烁星光
    for(let i=0;i<8;i++){let sx=W*(0.1+i*0.12+(Math.sin(t*2+i)*0.05)),sy=H*(0.05+Math.abs(Math.cos(t+i))*0.1);ctx.fillStyle='rgba(255,255,255,'+(0.3+Math.sin(t*3+i)*0.3)+')';ctx.beginPath();ctx.arc(sx,sy,1.5+Math.random(),0,Math.PI*2);ctx.fill()}
    // 主角
    drawDude(W/2,H*.44);
    // 名字
    ctx.fillStyle='#fff';ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=3;ctx.font=`bold ${Math.min(22,W*.06)}px PingFang SC,Microsoft YaHei,sans-serif`;ctx.textAlign='center';
    ctx.strokeText(chars[characterIndex].name,W/2,H*.1);ctx.fillText(chars[characterIndex].name,W/2,H*.1);
    // 金币
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.font='bold 16px monospace';ctx.fillText('🪙 '+gold,W/2+1,H*.78+1);
    ctx.fillStyle='#ffd700';ctx.fillText('🪙 '+gold,W/2,H*.78);
    // 肌肉条放底部
    let bars=['upper','chest','abs','legs'],names=['💪上肢','🦾胸肌','🥓腹肌','🦵下肢'];
    for(let i=0;i<4;i++){let m=muscles[bars[i]],need=xpNeeded(m),pct=xpData[bars[i]]/need;ctx.fillStyle='#fff';ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText(names[i]+' Lv'+Math.floor(m)+'('+Math.floor(xpData[bars[i]])+'/'+need+')',W*.06,H*.82+i*17);ctx.fillStyle='#333';ctx.fillRect(W*.35,H*.815+i*17,W*.55,8);let col=m>70?'#ff0':(m>40?'#fa0':(m>15?'#f80':'#f60'));ctx.fillStyle=col;ctx.fillRect(W*.35,H*.815+i*17,W*.55*(m/100),8);ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillRect(W*.35,H*.815+i*17,W*.55*pct,4)}
  }

  if(screen==='select'){
    ctx.fillStyle='#1a2a3a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(20,W*.05)}px PingFang SC,Microsoft YaHei,sans-serif`;ctx.textAlign='center';ctx.fillText('选择角色',W/2,H*.06);
    let n=chars.length;let cols=3,bw2=Math.min(80,W*.22),gap2=8;let rows=Math.ceil(n/cols);
    let tw2=cols*bw2+(cols-1)*gap2;
    for(let i=0;i<n;i++){let r=Math.floor(i/cols);let c=i%cols;let sx2=W/2-tw2/2;let x=sx2+c*(bw2+gap2)+bw2/2,y=H*.2+r*(H*.28);
      ctx.save();let ci=characterIndex;characterIndex=i;drawDude(x,y,1);characterIndex=ci;ctx.restore();
      ctx.fillStyle=i===characterIndex?'#ff0':'#fff';ctx.font='bold 10px PingFang SC,Microsoft YaHei,sans-serif';ctx.textAlign='center';ctx.fillText(chars[i].name,x,y+bw2*0.52);}
  }

  if(screen==='forest'){
      // 天空
    let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#5a9ae0');g.addColorStop(.6,'#b8d8f8');g.addColorStop(1,'#3a7a2e');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    for(let i=0;i<10;i++){ctx.fillStyle='rgba(255,255,255,.12)';ctx.beginPath();ctx.arc(W*(.08+i*.1),H*(.06+Math.sin(i)*.03),W*.06,0,Math.PI*2);ctx.fill()}
    ctx.fillStyle='#5a9a3a';ctx.fillRect(0,H*.62,W,H*.38);
    ctx.fillStyle='#4a7a2a';ctx.fillRect(0,H*.78,W,H*.22);
    // 树
    for(let t of forestTrees){if(t.hp<=0)continue;drawTree(t)}
    for(let t of forestTrees){if(t.hp>0)continue;ctx.fillStyle='rgba(100,100,100,.3)';ctx.fillRect(t.x-3,t.y-5,6,16);ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('🪵',t.x,t.y-6)}
    // 角色(正常大小)
    drawDude(player.x,player.y);
    // 粒子
    for(let p of particles){ctx.globalAlpha=Math.min(1,p.life/22);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();if(p.text){ctx.fillStyle='#ffd700';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y-5)}ctx.globalAlpha=1}
    // HUD
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,0,W,22);
    ctx.fillStyle='#ffd700';ctx.font='bold 11px monospace';ctx.textAlign='left';ctx.fillText('🪙'+gold,W*.02,15);
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText('🌳'+forestTrees.filter(t=>t.hp>0).length,W/2,15);
    ctx.fillStyle='#afa';ctx.textAlign='right';ctx.fillText('💪'+Math.floor(muscles.upper),W*.98,15);
    if(!chopping){ctx.fillStyle='#fff';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('👆 点击树 → 自动砍',W/2,H*.9)}
    if(chopping&&chopping.hp>0){let tp=TREE_TYPES[chopping.ti];ctx.fillStyle='#ffd700';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText(tp.name+' '+Math.max(1,Math.floor(tp.gold*(Math.floor(3+muscles.upper*.3+muscles.chest*.15)/tp.hp)))+'/斧',W/2,H*.9)}
  }

  if(screen==='iron'){
    ctx.fillStyle='#1a1a2a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(20,W*.05)}px PingFang SC,Microsoft YaHei,sans-serif`;ctx.textAlign='center';ctx.fillText('🏋️ 撸铁猛干',W/2,H*.3);
    ctx.fillStyle='#888';ctx.font='12px monospace';ctx.textAlign='center';ctx.fillText('🏗️ 即将开放',W/2,H*.5);
  }

  // 按钮
  for(let b of buttons){ctx.fillStyle=b.color;ctx.globalAlpha=.85;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.globalAlpha=1;ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(12,b.w*.12)}px monospace`;ctx.textAlign='center';ctx.fillText(b.text,b.x+b.w/2,b.y+b.h/2+4)}
}

// ========== 输入（简单点击模式） ==========
canvas.addEventListener('click',e=>{
  let mx=e.offsetX,my=e.offsetY;
  // 森林：点树=开始砍
  if(screen==='forest'){
    let t=forestTrees.find(t=>t.hp>0&&Math.hypot(mx-t.x,my-t.y)<t.r+20);
    if(t){chopping=t;chopCD=0;chop(t);return}
  }
  // 按钮
  for(let b of buttons){if(mx>b.x&&mx<b.x+b.w&&my>b.y&&my<b.y+b.h&&b.cb){b.cb();sfxClick();return}}
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  let r=canvas.getBoundingClientRect();
  let mx=e.touches[0].clientX-r.left,my=e.touches[0].clientY-r.top;
  // 森林：点树
  if(screen==='forest'){
    let t=forestTrees.find(t=>t.hp>0&&Math.hypot(mx-t.x,my-t.y)<t.r+20);
    if(t){chopping=t;chopCD=0;chop(t);return}
  }
  // 按钮
  for(let b of buttons){if(mx>b.x&&mx<b.x+b.w&&my>b.y&&my<b.y+b.h&&b.cb){b.cb();sfxClick();return}}
},{passive:false});

function loop(){update();draw();requestAnimationFrame(loop)}
goTo('home');loop();
</script>
</body>
</html>
