<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>肌肉英雄 - 撸树赚钱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;position:fixed;width:100%;height:100%;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
canvas{display:block}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;W=canvas.width;H=canvas.height}
resize();window.addEventListener('resize',resize);

// ========== BGM 放松音乐 ==========
let bgmOn=false, bgmCtx=null, bgmGain=null;
function toggleBGM(){
  if(!bgmCtx){initBGM()}
  bgmOn=!bgmOn;
  if(bgmGain)bgmGain.gain.value=bgmOn?0.12:0;
}
function initBGM(){
  try{
    bgmCtx=new(window.AudioContext||window.webkitAudioContext)();
    bgmGain=bgmCtx.createGain();bgmGain.gain.value=0.12;bgmGain.connect(bgmCtx.destination);
    // 主旋律: 放松的钢鼓感觉
    playBassLoop();playChordLoop();playMelodyLoop();
  }catch(e){}
}
function playNote(freq,start,dura,vol,type='triangle'){
  if(!bgmCtx)return;
  let o=bgmCtx.createOscillator(),g=bgmCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,bgmCtx.currentTime+start);
  g.gain.exponentialRampToValueAtTime(0.001,bgmCtx.currentTime+start+dura);
  o.connect(g);g.connect(bgmGain);o.start(bgmCtx.currentTime+start);o.stop(bgmCtx.currentTime+start+dura);
}
function playBassLoop(){
  let notes=[65.4,73.4,82.4,73.4,65.4,55.0,49.0,55.0]; // C2-D2-E2-D2-C2-A1-G1-A1
  function loop(){
    for(let i=0;i<notes.length;i++){let t=i*1.2;playNote(notes[i],t,0.8,0.25,'sine')}
    setTimeout(()=>{if(bgmOn)loop()},notes.length*1200);
  }loop();
}
function playChordLoop(){
  let chords=[[130.8,164.8,196.0],[146.8,174.6,220.0],[164.8,196.0,246.9],[130.8,164.8,196.0],[110.0,130.8,164.8],[98.0,123.5,146.8]];
  function loop(){
    for(let i=0;i<chords.length;i++){
      for(let n of chords[i])playNote(n,i*2.4,2.2,0.06,'sine');
    }
    setTimeout(()=>{if(bgmOn)loop()},chords.length*2400);
  }loop();
}
function playMelodyLoop(){
  let melody=[261.6,293.7,329.6,349.2,392.0,349.2,329.6,293.7,261.6,220.0,246.9,261.6,293.7,261.6,246.9,220.0];
  function loop(){
    for(let i=0;i<melody.length;i++){let t=i*1.8+Math.random()*0.15;playNote(melody[i],t,0.5,0.04,'triangle')}
    setTimeout(()=>{if(bgmOn)loop()},melody.length*1800+8000); // 间隔长
  }loop();
}

// ========== 游戏数据 ==========
let gold=0, screen='home', characterIndex=0, particles=[], buttons=[];
let muscles={upper:0,chest:0,abs:0,legs:0};
let xpData={upper:0,chest:0,abs:0,legs:0};
function xpNeeded(m){return 30+Math.floor(m*m*0.5);} // 等级平方增长

// 角色位置 & 移动
let player={x:0,y:0,tx:0,ty:0,moving:false,speed:2.5};
let joystickActive=false, joystickId=null, joystickBaseX=0,joystickBaseY=0,joystickDx=0,joystickDy=0;

// 树
const TREE_TYPES=[
  {name:'🌱小树苗',hp:25,gold:12,color:'#6b8a3a',r:22,xp:0.3},
  {name:'🌲松树',hp:70,gold:35,color:'#4a7a2a',r:30,xp:0.8},
  {name:'🌳橡树',hp:180,gold:90,color:'#6a5a2a',r:38,xp:1.5},
  {name:'🪵铁木',hp:450,gold:220,color:'#7a5a2a',r:46,xp:3},
  {name:'🔥神木',hp:1200,gold:600,color:'#ee6644',r:55,xp:8},
];
let forestTrees=[], chopping=null, chopCD=0, chopGain=0;
const CHOP_INT=45;

const chars=[
  {name:'呆萌小明',gender:'male',skin:'#ffcc88',hair:'#2a2a2a',eyes:'😶',top:'#4488cc',bot:'#334'},
  {name:'丑萌老王',gender:'male',skin:'#ccaa77',hair:'#1a1a1a',eyes:'😜',top:'#cc7744',bot:'#224'},
  {name:'帅气阿强',gender:'male',skin:'#eebb99',hair:'#3a3a3a',eyes:'😎',top:'#44aa44',bot:'#223'},
  {name:'大力小美',gender:'female',skin:'#ffe0cc',hair:'#8b4513',eyes:'😊',top:'#ee6699',bot:'#424'},
  {name:'飒爽阿珍',gender:'female',skin:'#d4a574',hair:'#1a1a1a',eyes:'😏',top:'#66aadd',bot:'#335'},
  {name:'酷酷小黑',gender:'male',skin:'#8d6e63',hair:'#111',eyes:'🫤',top:'#eeaa44',bot:'#332'},
];

// ========== 森林生成 ==========
function spawnForest(){
  forestTrees=[]; chopping=null; chopCD=0;
  let count=25+Math.floor(gold/40); count=Math.min(count,55);
  for(let i=0;i<count;i++){
    for(let tries=0;tries<15;tries++){
      let ti; let rnd=Math.random();
      if(rnd<0.4)ti=0; else if(rnd<0.7)ti=1; else if(rnd<0.87)ti=2; else if(rnd<0.96)ti=3; else ti=4;
      let tp=TREE_TYPES[ti];
      let rx=30+Math.random()*(W-60), ry=40+Math.random()*(H*0.7-20);
      if(Math.hypot(rx-player.x,ry-player.y)<80)continue; // 不挡住出生点
      let overlap=forestTrees.some(t=>Math.hypot(rx-t.x,ry-t.y)<tp.r+t.r+5);
      if(!overlap){forestTrees.push({x:rx,y:ry,hp:tp.hp,maxHP:tp.hp,ti,r:tp.r});break}
    }
  }
}

// ========== 砍树 ==========
function chop(t){
  if(chopCD>0)return;
  chopCD=CHOP_INT;
  let tp=TREE_TYPES[t.ti];
  let dmg=3+Math.floor(muscles.upper*0.3)+Math.floor(muscles.chest*0.15);
  t.hp-=dmg;
  let hitGold=Math.max(1,Math.floor(tp.gold*(dmg/tp.hp)));
  chopGain=hitGold; gold+=hitGold;
  xpData.upper+=tp.xp*0.15;
  for(let i=0;i<3;i++)particles.push({x:t.x+Math.random()*8,y:t.y,vx:(Math.random()-0.5)*4,vy:-1-Math.random()*4,life:14,color:'#8b5a2b',r:2+Math.random()*2});
  if(hitGold>5)particles.push({x:player.x,y:player.y-20,vx:0,vy:-2,life:18,color:'#ffd700',r:0,text:'💰+'+hitGold});
  if(t.hp<=0){t.hp=0;chopping=null;xpData.upper+=tp.xp*0.7;
    for(let i=0;i<14;i++)particles.push({x:t.x,y:t.y,vx:(Math.random()-0.5)*12,vy:-3-Math.random()*10,life:22,color:'#ffd700',r:3+Math.random()*4});}
}
function checkExp(){
  for(let k of Object.keys(xpData)){
    let need=xpNeeded(muscles[k]);
    if(xpData[k]>=need&&muscles[k]<100){xpData[k]-=need;muscles[k]=Math.min(100,muscles[k]+1)}
  }
}

// ========== 屏幕 ==========
function goTo(s){
  screen=s;buttons=[];
  if(s==='home'){if(!bgmCtx)initBGM();if(!bgmOn)toggleBGM(); // 自动开BGM
    btn(W*.25,H*.66,Math.min(180,W*.5),60,'🪓 撸树赚钱','#4a8',()=>goTo('forest'));btn(W*.25,H*.66+68,Math.min(180,W*.5),60,'🏋️ 撸铁猛干','#48a',()=>goTo('iron'));btn(W*.25,H*.66+136,Math.min(180,W*.5),44,'👤 换人','#888',()=>goTo('select'));
    // BGM按钮
    btn(W-50,8,42,26,'🎵','rgba(255,255,255,.15)',()=>toggleBGM());}
  if(s==='select'){let n=chars.length;let bw=Math.min(60,W*.13);let gap=5;let rowW=n*bw+(n-1)*gap;let sx=W/2-rowW/2;for(let i=0;i<n;i++){let idx=i;btn(sx+i*(bw+gap),H*.58,bw,54,chars[i].name,'#555',()=>{characterIndex=idx;goTo('home')})}btn(W/2-50,H*.72,100,36,'← 返回','#555',()=>goTo('home'))}
  if(s==='forest'){player.x=W/2;player.y=H*.65;spawnForest();btn(W/2-50,H*.94,100,36,'← 回主页','#555',()=>goTo('home'));}
  if(s==='iron'){btn(W/2-70,H*.65,140,46,'🏗️ 即将开放','#555',null);btn(W/2-50,H*.76,100,36,'← 返回','#555',()=>goTo('home'))}
  chopCD=0;chopping=null;joystickActive=false;
}

function btn(x,y,w,h,text,color,cb){buttons.push({x,y,w,h,text,color,cb})}

// ========== 画人（占屏幕3/4） ==========
function drawDude(cx,cy,z){
  let s=z||1;let m=muscles;let ch=chars[characterIndex];
  let bh=Math.min(H*0.5,W*3)*s;ctx.save();ctx.translate(cx,cy);
  let isF=ch.gender=='female';
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(0,bh*0.85,bh*0.5+m.legs*bh*0.01,bh*0.07,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#444';ctx.fillRect(-bh*0.18,bh*1.02,bh*0.4,8);ctx.fillRect(bh*0.08,bh*1.02,bh*0.4,8);
  let cw=bh*0.13+m.legs*bh*0.008;
  ctx.fillStyle=ch.skin;ctx.fillRect(-bh*0.12,bh*0.8,cw,bh*0.25);ctx.fillStyle=ch.skin;ctx.fillRect(bh*0.12-cw,bh*0.8,cw,bh*0.25);
  let tw=cw*1.3,th=bh*0.4;
  ctx.fillStyle=ch.skin;ctx.fillRect(-bh*0.15,bh*0.42,tw,th);ctx.fillStyle=ch.skin;ctx.fillRect(bh*0.15-tw,bh*0.42,tw,th);
  ctx.fillStyle=ch.bot;ctx.fillRect(-bh*0.22,bh*0.4,bh*0.44,bh*0.15);ctx.fillRect(bh*0.05,bh*0.4,bh*0.44,bh*0.15);
  let bw=bh*0.3+m.chest*bh*0.012;if(isF)bw=bh*0.28+m.chest*bh*0.01;
  ctx.fillStyle=ch.skin;ctx.fillRect(-bw,bh*0.0,bw*2,bh*0.5);
  ctx.fillStyle=ch.top;ctx.fillRect(-bw*0.85,bh*0.02,bw*1.7,bh*0.35);
  if(m.chest>8){ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,bh*0.06);ctx.lineTo(0,bh*0.25);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.arc(-bw*0.22,bh*0.12,bw*0.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(bw*0.22,bh*0.12,bw*0.3,0,Math.PI*2);ctx.fill()}
  if(m.abs>10){ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1.2;let n=Math.min(6,Math.floor(m.abs/15));for(let i=1;i<=n;i++){ctx.beginPath();ctx.moveTo(-bw*0.5,bh*0.22+bh*0.05*i);ctx.lineTo(bw*0.5,bh*0.22+bh*0.05*i);ctx.stroke()}ctx.beginPath();ctx.moveTo(0,bh*0.22);ctx.lineTo(0,bh*0.22+bh*0.05*n);ctx.stroke()}
  let aw=bh*0.09+m.upper*bh*0.01,ah=bh*0.38;
  ctx.fillStyle=ch.skin;ctx.fillRect(-bw-aw-2,bh*0.04,aw,ah);
  let au=(screen=='forest'&&chopping&&chopCD>CHOP_INT*0.6)?-bh*0.25:0;
  ctx.fillStyle=ch.skin;ctx.fillRect(bw+2,bh*0.04+au,aw,ah);
  if(m.upper>20){ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.arc(bw+aw/2,bh*0.14+au,aw*0.7,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(-bw-aw/2,bh*0.14,aw*0.7,0,Math.PI*2);ctx.fill()}
  ctx.fillStyle=ch.skin;ctx.fillRect(bw+2,bh*0.38+au,aw*0.85,bh*0.18);ctx.fillRect(-bw-aw-1,bh*0.38,aw*0.85,bh*0.18);
  ctx.fillStyle=ch.skin;ctx.beginPath();ctx.arc(-bw-aw/2,bh*0.56,aw*0.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(bw+aw/2,bh*0.56+au,aw*0.5,0,Math.PI*2);ctx.fill();
  if(screen=='forest'&&chopping){ctx.fillStyle='#6a4a2a';ctx.fillRect(bw+aw+6,bh*0.08+au-bh*0.22,6,bh*0.5);ctx.fillStyle='#999';ctx.fillRect(bw+aw-4,bh*0.08+au-bh*0.28,24,14)}
  let hr=bh*0.28;
  ctx.fillStyle=ch.skin;ctx.beginPath();ctx.arc(0,-bh*0.1,hr,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=ch.hair;
  if(isF){ctx.beginPath();ctx.arc(0,-bh*0.1,hr+3,Math.PI,0);ctx.fill();ctx.fillRect(-hr-3,-bh*0.1,hr*0.4,bh*0.3);ctx.fillRect(hr+3-hr*0.4,-bh*0.1,hr*0.4,bh*0.3)}
  else{ctx.beginPath();ctx.arc(0,-bh*0.18,hr*1.08,Math.PI,Math.PI*2);ctx.fill()}
  let fs=Math.floor(hr*0.8);
  ctx.fillStyle='#000';ctx.font=fs+'px monospace';ctx.textAlign='center';ctx.fillText(ch.eyes,0,-bh*0.06);
  ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,-bh*0.01,hr*0.15+Math.min(12,m.chest*0.1)*0.1,0.1,Math.PI-0.1);ctx.stroke();
  ctx.fillStyle=ch.skin;ctx.fillRect(-bh*0.06,-bh*0.01,bh*0.12,bh*0.1);
  ctx.restore();
}

function drawTree(t){
  let tp=TREE_TYPES[t.ti];
  ctx.save();ctx.translate(t.x,t.y);
  // 树冠阴影
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.arc(2,2,tp.r,0,Math.PI*2);ctx.fill();
  // 树干
  ctx.fillStyle='#7a5a2b';ctx.fillRect(-tp.r*0.22,0,tp.r*0.44,tp.r*1.1);
  // 树冠
  ctx.fillStyle=tp.color;ctx.beginPath();ctx.arc(0,-tp.r*0.25,tp.r,0,Math.PI*2);ctx.fill();
  if(t.ti>=2){ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.arc(tp.r*0.25,-tp.r*0.5,tp.r*0.55,0,Math.PI*2);ctx.fill()}
  if(t.ti>=4){ctx.fillStyle='rgba(255,100,40,0.2)';ctx.beginPath();ctx.arc(0,-tp.r*0.4,tp.r*1.05,0,Math.PI*2);ctx.fill()}
  // 选中/砍中动画
  if(t===chopping&&chopCD>CHOP_INT*0.5){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(0,-tp.r*0.25,tp.r+5,0,Math.PI*2);ctx.fill()}
  // 血条
  if(t.hp>0&&t.hp<t.maxHP){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(-tp.r,tp.r*1.2,tp.r*2,4);
    ctx.fillStyle=t.hp/t.maxHP>0.5?'#0f0':'#ff0';ctx.fillRect(-tp.r,tp.r*1.2,tp.r*2*(t.hp/t.maxHP),4);
  }
  // 名字
  if(t.hp>0&&t.hp<t.maxHP){ctx.fillStyle='#fff';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(tp.name,tp.r*0.7,-tp.r*0.6)}
  ctx.restore();
}

// ========== 更新 ==========
function update(){
  if(chopCD>0)chopCD--;
  checkExp();
  // 角色移动
  if(joystickActive){
    let d=Math.hypot(joystickDx,joystickDy);
    if(d>8){let dx=joystickDx/d,dy=joystickDy/d;player.x+=dx*player.speed;player.y+=dy*player.speed}
  }
  player.x=Math.max(40,Math.min(W-40,player.x));
  player.y=Math.max(50,Math.min(H*0.82,player.y));

  if(screen==='forest'){
    // 树再生
    if(forestTrees.filter(t=>t.hp>0).length<15&&Math.random()<0.02){
      let ti=Math.random()<0.5?0:(Math.random()<0.75?1:2);
      let tp=TREE_TYPES[ti];
      let rx=30+Math.random()*(W-60),ry=40+Math.random()*(H*0.6);
      if(!forestTrees.filter(t=>t.hp>0).some(t=>Math.hypot(rx-t.x,ry-t.y)<tp.r+10))forestTrees.push({x:rx,y:ry,hp:tp.hp,maxHP:tp.hp,ti,r:tp.r});
    }

    // 简单：如果有选中的树就砍
    if(chopping&&chopping.hp>0){if(chopCD<=0)chop(chopping)}
    else chopping=null;
  }

  // 粒子
  for(let p of particles){if(p.vx!==undefined){p.x+=p.vx;p.y+=p.vy}p.life--}
  particles=particles.filter(p=>p.life>0);
}

// ========== 渲染 ==========
function draw(){
  ctx.clearRect(0,0,W,H);

  if(screen==='home'){
    let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#2a3a5a');g.addColorStop(1,'#1a2a3a');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    // ★主角占正中75%屏幕★
    drawDude(W/2,H*.42,.95);
    // 名字
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(22,W*.06)}px PingFang SC,Microsoft YaHei,sans-serif`;ctx.textAlign='center';
    ctx.fillText(chars[characterIndex].name,W/2,H*.1);
    // 金币在脚底
    ctx.fillStyle='#ffd700';ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.fillText('🪙 '+gold,W/2,H*.78);
    // 肌肉条放底部
    let bars=['upper','chest','abs','legs'],names=['💪上肢','🦾胸肌','🥓腹肌','🦵下肢'];
    for(let i=0;i<4;i++){let m=muscles[bars[i]],need=xpNeeded(m),pct=xpData[bars[i]]/need;ctx.fillStyle='#fff';ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText(names[i]+' Lv'+Math.floor(m)+'('+Math.floor(xpData[bars[i]])+'/'+need+')',W*.06,H*.82+i*17);ctx.fillStyle='#333';ctx.fillRect(W*.35,H*.815+i*17,W*.55,8);let col=m>70?'#ff0':(m>40?'#fa0':(m>15?'#f80':'#f60'));ctx.fillStyle=col;ctx.fillRect(W*.35,H*.815+i*17,W*.55*(m/100),8);ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillRect(W*.35,H*.815+i*17,W*.55*pct,4)}
  }

  if(screen==='select'){
    ctx.fillStyle='#1a2a3a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(20,W*.05)}px PingFang SC,Microsoft YaHei,sans-serif`;ctx.textAlign='center';ctx.fillText('选择角色',W/2,H*.1);
    let n=chars.length;let bw=Math.min(80,W*.17);let gap=8;let row=n<5?1:2;let perRow=Math.ceil(n/row);
    for(let i=0;i<n;i++){let r=Math.floor(i/perRow);let c=i%perRow;let sx=W/2-(perRow*(bw+gap)-gap)/2;let x=sx+c*(bw+gap),y=H*.32+r*(H*.25);
      ctx.save();let ci=characterIndex;characterIndex=i;drawDude(x,y,.45);characterIndex=ci;ctx.restore();
      ctx.fillStyle=i===characterIndex?'#ff0':'#888';ctx.font='8px PingFang SC,Microsoft YaHei,sans-serif';ctx.textAlign='center';ctx.fillText(chars[i].name,x,y-30);}
  }

  if(screen==='forest'){
      // 天空
    let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#5a9ae0');g.addColorStop(.6,'#b8d8f8');g.addColorStop(1,'#3a7a2e');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    for(let i=0;i<10;i++){ctx.fillStyle='rgba(255,255,255,.12)';ctx.beginPath();ctx.arc(W*(.08+i*.1),H*(.06+Math.sin(i)*.03),W*.06,0,Math.PI*2);ctx.fill()}
    ctx.fillStyle='#5a9a3a';ctx.fillRect(0,H*.62,W,H*.38);
    ctx.fillStyle='#4a7a2a';ctx.fillRect(0,H*.78,W,H*.22);
    // 树
    for(let t of forestTrees){if(t.hp<=0)continue;drawTree(t)}
    for(let t of forestTrees){if(t.hp>0)continue;ctx.fillStyle='rgba(100,100,100,.3)';ctx.fillRect(t.x-3,t.y-5,6,16);ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('🪵',t.x,t.y-6)}
    // 角色(正常大小)
    drawDude(player.x,player.y,.5);
    // 粒子
    for(let p of particles){ctx.globalAlpha=Math.min(1,p.life/22);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();if(p.text){ctx.fillStyle='#ffd700';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y-5)}ctx.globalAlpha=1}
    // HUD
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,0,W,22);
    ctx.fillStyle='#ffd700';ctx.font='bold 11px monospace';ctx.textAlign='left';ctx.fillText('🪙'+gold,W*.02,15);
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText('🌳'+forestTrees.filter(t=>t.hp>0).length,W/2,15);
    ctx.fillStyle='#afa';ctx.textAlign='right';ctx.fillText('💪'+Math.floor(muscles.upper),W*.98,15);
    if(!chopping){ctx.fillStyle='#fff';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('👆 点击树 → 自动砍',W/2,H*.9)}
    if(chopping&&chopping.hp>0){let tp=TREE_TYPES[chopping.ti];ctx.fillStyle='#ffd700';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText(tp.name+' '+Math.max(1,Math.floor(tp.gold*(Math.floor(3+muscles.upper*.3+muscles.chest*.15)/tp.hp)))+'/斧',W/2,H*.9)}
  }

  if(screen==='iron'){
    ctx.fillStyle='#1a1a2a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(20,W*.05)}px PingFang SC,Microsoft YaHei,sans-serif`;ctx.textAlign='center';ctx.fillText('🏋️ 撸铁猛干',W/2,H*.3);
    ctx.fillStyle='#888';ctx.font='12px monospace';ctx.textAlign='center';ctx.fillText('🏗️ 即将开放',W/2,H*.5);
  }

  // 按钮
  for(let b of buttons){ctx.fillStyle=b.color;ctx.globalAlpha=.85;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.globalAlpha=1;ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(12,b.w*.12)}px monospace`;ctx.textAlign='center';ctx.fillText(b.text,b.x+b.w/2,b.y+b.h/2+4)}
}

// ========== 输入（简单点击模式） ==========
canvas.addEventListener('click',e=>{
  let mx=e.offsetX,my=e.offsetY;
  // 森林：点树=开始砍
  if(screen==='forest'){
    let t=forestTrees.find(t=>t.hp>0&&Math.hypot(mx-t.x,my-t.y)<t.r+20);
    if(t){chopping=t;chopCD=0;chop(t);return}
  }
  // 按钮
  for(let b of buttons){if(mx>b.x&&mx<b.x+b.w&&my>b.y&&my<b.y+b.h&&b.cb){b.cb();return}}
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  let r=canvas.getBoundingClientRect();
  let mx=e.touches[0].clientX-r.left,my=e.touches[0].clientY-r.top;
  // 森林：点树
  if(screen==='forest'){
    let t=forestTrees.find(t=>t.hp>0&&Math.hypot(mx-t.x,my-t.y)<t.r+20);
    if(t){chopping=t;chopCD=0;chop(t);return}
  }
  // 按钮
  for(let b of buttons){if(mx>b.x&&mx<b.x+b.w&&my>b.y&&my<b.y+b.h&&b.cb){b.cb();return}}
},{passive:false});

function loop(){update();draw();requestAnimationFrame(loop)}
goTo('home');loop();
</script>
</body>
